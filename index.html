<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Analitico | Cliente Retail</title>
    <style>
:root {
  --bg: #f4f7fb;
  --surface: rgba(255, 255, 255, 0.92);
  --surface-strong: #ffffff;
  --border: rgba(15, 23, 42, 0.08);
  --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
  --text: #0f172a;
  --muted: #5f6c85;
  --teal: #0f766e;
  --blue: #155eef;
  --gold: #f59e0b;
  --red: #dc2626;
  --green-soft: #e7f8f0;
  --red-soft: #feecec;
  --neutral-soft: #eef3fb;
  --radius: 22px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Avenir Next", "Manrope", "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(21, 94, 239, 0.16), transparent 34%),
    radial-gradient(circle at top right, rgba(15, 118, 110, 0.18), transparent 28%),
    linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
}

button,
input,
select {
  font: inherit;
}

.shell {
  width: min(1440px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 32px 0 48px;
}

.panel {
  background: var(--surface);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.topbar,
.filters,
.summary-panel {
  padding: 24px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 24px;
  align-items: flex-start;
}

.topbar h1,
.panel h2,
.insight-card h3 {
  margin: 0;
}

.subtle,
.kpi-card__caption,
.empty-state p,
.insight-card p,
.context-note {
  color: var(--muted);
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--blue);
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.topbar-actions {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.date-pill,
.score-pill {
  padding: 10px 14px;
  border-radius: 999px;
  background: #edf4ff;
  color: var(--blue);
  font-weight: 700;
}

.button,
select,
input {
  border: 1px solid rgba(15, 23, 42, 0.1);
  background: #fff;
  color: var(--text);
  border-radius: 14px;
  padding: 10px 14px;
}

.button {
  cursor: pointer;
  font-weight: 600;
}

.button-primary {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}

.filters {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 18px;
  margin-top: 20px;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.filter-group label {
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--muted);
}

.filter-group--wide {
  grid-column: span 2;
}

.chip-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.chip {
  border: 1px solid rgba(21, 94, 239, 0.15);
  background: #f8fbff;
  color: #365072;
  border-radius: 999px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.chip-active {
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-color: transparent;
  color: #fff;
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 18px;
  margin-top: 20px;
}

.kpi-card {
  padding: 22px;
}

.kpi-card__top,
.panel-head,
.legend-row,
.table-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.kpi-card__label {
  color: var(--muted);
  font-weight: 600;
}

.kpi-card__value {
  display: block;
  margin-top: 18px;
  font-size: clamp(1.7rem, 2vw, 2.4rem);
  line-height: 1;
  letter-spacing: -0.03em;
}

.variation {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 0.82rem;
  font-weight: 700;
}

.variation--positive {
  background: var(--green-soft);
  color: #0e7a4a;
}

.variation--negative {
  background: var(--red-soft);
  color: #c12c37;
}

.variation--neutral {
  background: var(--neutral-soft);
  color: #64748b;
}

.content-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin-top: 18px;
}

.chart-panel,
.insights-panel {
  padding: 22px;
}

.chart-panel--wide {
  min-width: 0;
}

.chart-wrap {
  margin-top: 18px;
  overflow: hidden;
}

.chart-wrap svg {
  width: 100%;
  height: auto;
  display: block;
}

.context-note {
  margin: 10px 0 0;
  font-size: 0.9rem;
  font-weight: 600;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  color: var(--muted);
  font-weight: 600;
}

.legend span,
.legend-row__label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  display: inline-block;
}

.legend-dot--teal,
.legend-dot--idx-1 {
  background: var(--teal);
}

.legend-dot--gold,
.legend-dot--idx-2 {
  background: var(--gold);
}

.legend-dot--idx-0 {
  background: var(--blue);
}

.legend-dot--idx-3 {
  background: #7c3aed;
}

.donut-layout {
  display: grid;
  grid-template-columns: minmax(180px, 220px) 1fr;
  gap: 8px 18px;
  align-items: center;
  margin-top: 18px;
}

.donut-legend {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.chart-label {
  fill: #60728a;
  font-size: 12px;
  font-family: "Avenir Next", "Manrope", "Segoe UI", sans-serif;
}

.chart-value {
  fill: #0f172a;
  font-size: 12px;
  font-weight: 700;
  font-family: "Avenir Next", "Manrope", "Segoe UI", sans-serif;
}

.chart-grid {
  stroke: rgba(96, 114, 138, 0.16);
  stroke-width: 1;
}

.donut-total,
.donut-subtitle {
  font-family: "Avenir Next", "Manrope", "Segoe UI", sans-serif;
  fill: #0f172a;
}

.donut-total {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.03em;
}

.donut-subtitle {
  font-size: 14px;
  fill: var(--muted);
}

.insight-list {
  display: grid;
  gap: 14px;
  margin-top: 18px;
}

.insight-card {
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: 18px;
  padding: 18px;
  background: linear-gradient(180deg, rgba(248, 251, 255, 0.95), rgba(242, 247, 255, 0.88));
}

.insight-label {
  display: inline-block;
  margin-bottom: 10px;
  color: var(--blue);
  font-weight: 700;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.summary-panel {
  margin-top: 18px;
}

.footer-note {
  margin-top: 24px;
  text-align: center;
  color: var(--muted);
  font-weight: 700;
  letter-spacing: 0.04em;
}

.panel-head--stack-mobile {
  flex-wrap: wrap;
}

.table-wrap {
  overflow-x: auto;
  margin-top: 18px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 860px;
}

th,
td {
  text-align: left;
  padding: 14px 12px;
  border-bottom: 1px solid rgba(15, 23, 42, 0.07);
}

th {
  color: var(--muted);
  font-size: 0.85rem;
}

tbody tr:hover {
  background: rgba(237, 244, 255, 0.7);
}

.empty-state,
.loading-shell,
.error-panel,
.chart-empty {
  display: grid;
  place-items: center;
  text-align: center;
}

.empty-state,
.error-panel {
  padding: 48px 24px;
}

.loading-shell {
  min-height: 100vh;
}

.loading-card {
  display: grid;
  gap: 14px;
  place-items: center;
  padding: 34px;
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.spinner {
  width: 42px;
  height: 42px;
  border-radius: 999px;
  border: 4px solid rgba(21, 94, 239, 0.12);
  border-top-color: var(--blue);
  animation: spin 0.9s linear infinite;
}

.empty-state__icon {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  color: var(--blue);
  background: #edf4ff;
  font-size: 1.4rem;
  margin-bottom: 14px;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

@media (max-width: 1140px) {
  .filters,
  .kpi-grid,
  .content-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .chart-panel--wide,
  .insights-panel,
  .summary-panel {
    grid-column: 1 / -1;
  }
}

@media (max-width: 820px) {
  .shell {
    width: min(100vw - 20px, 1440px);
    padding-top: 20px;
  }

  .topbar,
  .filters {
    grid-template-columns: 1fr;
  }

  .topbar,
  .filters,
  .kpi-grid,
  .content-grid {
    display: grid;
  }

  .kpi-grid,
  .content-grid {
    grid-template-columns: 1fr;
  }

  .filter-group--wide {
    grid-column: auto;
  }

  .donut-layout {
    grid-template-columns: 1fr;
  }

  .table-controls {
    width: 100%;
    flex-wrap: wrap;
  }

  .table-controls > * {
    flex: 1 1 180px;
  }
}

</style>
  </head>
  <body>
    <div id="app">
      <div class="shell loading-shell">
        <div class="loading-card">
          <div class="spinner"></div>
          <p>Cargando dashboard...</p>
        </div>
      </div>
    </div>
    <script type="module">
const rawDataset = [
  {
    category: "Motos",
    months: {
      Enero: { leads: "8.717", amount: "$23.348,13", cpl: "$2,68", cpm: "$1,43", ctr: "0,56%" },
      Febrero: { leads: "10.714", amount: "$22.138,73", cpl: "$2,07", cpm: "$1,29", ctr: "0,59%" },
      Marzo: { leads: "8.680", amount: "$14.527,89", cpl: "$1,67", cpm: "$1,31", ctr: "0,63%" },
      Abril: { leads: "7.802", amount: "$22.342,00", cpl: "$2,86", cpm: "$1,54", ctr: "0,66%" },
    },
  },
  {
    category: "Tecno",
    months: {
      Enero: { leads: "12.028", amount: "$22.160,54", cpl: "$1,84", cpm: "$1,81", ctr: "0,59%" },
      Febrero: { leads: "10.774", amount: "$23.981,42", cpl: "$2,23", cpm: "$1,75", ctr: "0,62%" },
      Marzo: { leads: "8.358", amount: "$9.915,09", cpl: "$1,19", cpm: "$1,38", ctr: "0,69%" },
      Abril: { leads: "12.667", amount: "$23.144,00", cpl: "$1,83", cpm: "$1,51", ctr: "0,60%" },
    },
  },
  {
    category: "Electro",
    months: {
      Enero: { leads: "5.077", amount: "$8.829,02", cpl: "$1,74", cpm: "$2,10", ctr: "0,73%" },
      Febrero: { leads: "4.785", amount: "$8.851,66", cpl: "$1,85", cpm: "$1,94", ctr: "0,73%" },
      Marzo: { leads: "2.746", amount: "$2.692,61", cpl: "$0,98", cpm: "$1,54", ctr: "0,85%" },
      Abril: { leads: "2.733", amount: "$4.161,00", cpl: "$1,52", cpm: "$1,46", ctr: "0,66%" },
    },
  },
  {
    category: "Muebles",
    months: {
      Enero: { leads: "2.633", amount: "$3.713,20", cpl: "$1,01", cpm: "$2,11", ctr: "0,81%" },
      Febrero: { leads: "2.362", amount: "$3.806,26", cpl: "$1,61", cpm: "$1,97", ctr: "0,83%" },
      Marzo: { leads: "1.027", amount: "$808,94", cpl: "$0,79", cpm: "$1,29", ctr: "0,95%" },
      Abril: { leads: "1.732", amount: "$1.803,00", cpl: "$1,04", cpm: "$1,47", ctr: "0,78%" },
    },
  },
];


const monthOrder = ["Enero", "Febrero", "Marzo", "Abril"];

function parseLocalizedNumber(value) {
  if (typeof value === "number") return value;
  return Number(
    value
      .replace("$", "")
      .replace("%", "")
      .replace(/\./g, "")
      .replace(",", ".")
      .trim()
  );
}

function formatInteger(value) {
  return new Intl.NumberFormat("es-AR", { maximumFractionDigits: 0 }).format(value);
}

function formatCurrency(value) {
  return new Intl.NumberFormat("es-AR", {
    style: "currency",
    currency: "USD",
    minimumFractionDigits: 0,
    maximumFractionDigits: 2,
  }).format(value);
}

function formatCompactCurrency(value) {
  return new Intl.NumberFormat("es-AR", {
    style: "currency",
    currency: "USD",
    notation: "compact",
    maximumFractionDigits: 1,
  }).format(value);
}

function formatDecimal(value, digits = 2) {
  return new Intl.NumberFormat("es-AR", {
    minimumFractionDigits: digits,
    maximumFractionDigits: digits,
  }).format(value);
}

function formatPercent(value, digits = 2) {
  return `${formatDecimal(value, digits)}%`;
}

function formatSignedPercent(value, digits = 1) {
  const sign = value > 0 ? "+" : "";
  return `${sign}${formatDecimal(value, digits)}%`;
}

function getVariationTone(value, inverse = false) {
  if (value === 0) return "neutral";
  const positive = inverse ? value < 0 : value > 0;
  return positive ? "positive" : "negative";
}



function normalizeDataset(rawDataset) {
  return rawDataset.flatMap((group) =>
    monthOrder.map((month) => ({
      category: group.category,
      month,
      leads: parseLocalizedNumber(group.months[month].leads),
      amount: parseLocalizedNumber(group.months[month].amount),
      cpl: parseLocalizedNumber(group.months[month].cpl),
      cpm: parseLocalizedNumber(group.months[month].cpm),
      ctr: parseLocalizedNumber(group.months[month].ctr),
    }))
  );
}

function getAvailableFilters(rows) {
  return {
    categories: [...new Set(rows.map((row) => row.category))],
    months: monthOrder.filter((month) => rows.some((row) => row.month === month)),
  };
}

function filterRows(rows, filters) {
  const monthIndexes = monthOrder.reduce((acc, month, index) => {
    acc[month] = index;
    return acc;
  }, {});

  return rows.filter((row) => {
    const monthIndex = monthIndexes[row.month];
    const startIndex = monthIndexes[filters.startMonth];
    const endIndex = monthIndexes[filters.endMonth];
    const inRange = monthIndex >= startIndex && monthIndex <= endIndex;
    const inCategory =
      filters.categories.length === 0 || filters.categories.includes(row.category);

    return inRange && inCategory;
  });
}

function aggregateKpis(rows) {
  const totals = rows.reduce(
    (acc, row) => {
      acc.leads += row.leads;
      acc.amount += row.amount;
      acc.ctrWeighted += row.ctr * row.leads;
      acc.cpmWeighted += row.cpm * row.amount;
      return acc;
    },
    { leads: 0, amount: 0, ctrWeighted: 0, cpmWeighted: 0 }
  );

  const cpl = totals.leads ? totals.amount / totals.leads : 0;
  const ctr = totals.leads ? totals.ctrWeighted / totals.leads : 0;
  const cpm = totals.amount ? totals.cpmWeighted / totals.amount : 0;

  return {
    leads: totals.leads,
    amount: totals.amount,
    cpl,
    cpm,
    ctr,
  };
}

function getPreviousPeriodRows(allRows, filters) {
  const startIndex = monthOrder.indexOf(filters.startMonth);
  const endIndex = monthOrder.indexOf(filters.endMonth);
  const periodLength = endIndex - startIndex + 1;
  const prevStart = startIndex - periodLength;
  const prevEnd = startIndex - 1;

  if (prevStart < 0 || prevEnd < 0) return [];

  return allRows.filter((row) => {
    const monthIndex = monthOrder.indexOf(row.month);
    const inRange = monthIndex >= prevStart && monthIndex <= prevEnd;
    const inCategory =
      filters.categories.length === 0 || filters.categories.includes(row.category);

    return inRange && inCategory;
  });
}

function getVariation(current, previous) {
  if (!previous) return 0;
  return ((current - previous) / previous) * 100;
}

function buildMonthlySeries(rows) {
  return monthOrder
    .map((month) => {
      const monthRows = rows.filter((row) => row.month === month);
      if (monthRows.length === 0) return null;

      const monthKpis = aggregateKpis(monthRows);

      return {
        month,
        ...monthKpis,
      };
    })
    .filter(Boolean);
}

function buildCategoryBreakdown(rows, focusMonth) {
  const scoped = focusMonth ? rows.filter((row) => row.month === focusMonth) : rows;
  return [...new Set(scoped.map((row) => row.category))]
    .map((category) => {
      const categoryRows = scoped.filter((row) => row.category === category);
      const kpis = aggregateKpis(categoryRows);
      return {
        category,
        ...kpis,
      };
    })
    .sort((a, b) => b.leads - a.leads);
}

function buildInsightCards(rows, monthlySeries, categoryBreakdown) {
  if (!rows.length) return [];

  const bestLeadMonth = [...monthlySeries].sort((a, b) => b.leads - a.leads)[0];
  const bestCtrCategory = [...categoryBreakdown].sort((a, b) => b.ctr - a.ctr)[0];
  const bestCplCategory = [...categoryBreakdown].sort((a, b) => a.cpl - b.cpl)[0];
  const highestSpendMonth = [...monthlySeries].sort((a, b) => b.amount - a.amount)[0];

  return [
    {
      label: "Mayor volumen",
      title: `${bestLeadMonth.month} lidera en leads`,
      text: `${bestLeadMonth.leads.toLocaleString("es-AR")} leads con ${bestLeadMonth.amount.toLocaleString("es-AR", {
        style: "currency",
        currency: "USD",
      })} invertidos.`,
    },
    {
      label: "Mejor engagement",
      title: `${bestCtrCategory.category} destaca en CTR`,
      text: `${bestCtrCategory.ctr.toFixed(2).replace(".", ",")}% promedio en el periodo filtrado.`,
    },
    {
      label: "Eficiencia",
      title: `${bestCplCategory.category} tiene el CPL mas bajo`,
      text: `${bestCplCategory.cpl.toFixed(2).replace(".", ",")} USD por lead, favorable para escalar.`,
    },
    {
      label: "Presion de inversion",
      title: `${highestSpendMonth.month} concentra mayor gasto`,
      text: `${highestSpendMonth.amount.toLocaleString("es-AR", {
        style: "currency",
        currency: "USD",
      })} y una señal clara para revisar retorno.`,
    },
  ];
}

function buildTableRows(rows) {
  return rows.map((row) => ({
    ...row,
    efficiencyScore: row.leads ? row.ctr / row.cpl : 0,
  }));
}



function createSvg(width, height, content) {
  return `<svg viewBox="0 0 ${width} ${height}" role="img" aria-hidden="true">${content}</svg>`;
}

function renderLineChart(data) {
  if (!data.length) return renderEmptyChart("Sin datos para la tendencia mensual.");

  const width = 640;
  const height = 260;
  const padding = { top: 18, right: 18, bottom: 34, left: 18 };
  const innerWidth = width - padding.left - padding.right;
  const innerHeight = height - padding.top - padding.bottom;
  const maxValue = Math.max(...data.map((item) => Math.max(item.leads, item.amount / 2)));
  const stepX = innerWidth / Math.max(1, data.length - 1);

  const toX = (index) => padding.left + stepX * index;
  const toY = (value) => padding.top + innerHeight - (value / maxValue) * innerHeight;

  const leadsPoints = data.map((item, index) => `${toX(index)},${toY(item.leads)}`).join(" ");
  const spendPoints = data
    .map((item, index) => `${toX(index)},${toY(item.amount / 2)}`)
    .join(" ");

  const xLabels = data
    .map(
      (item, index) =>
        `<text x="${toX(index)}" y="${height - 10}" text-anchor="middle" class="chart-label">${item.month}</text>`
    )
    .join("");

  const markers = data
    .map((item, index) => {
      const leadX = toX(index);
      const leadY = toY(item.leads);
      const spendY = toY(item.amount / 2);
      return `
        <circle cx="${leadX}" cy="${leadY}" r="4" fill="#0f766e"></circle>
        <circle cx="${leadX}" cy="${spendY}" r="4" fill="#f59e0b"></circle>
      `;
    })
    .join("");

  const grid = [0.25, 0.5, 0.75]
    .map(
      (ratio) =>
        `<line x1="${padding.left}" y1="${padding.top + innerHeight * ratio}" x2="${
          width - padding.right
        }" y2="${padding.top + innerHeight * ratio}" class="chart-grid"></line>`
    )
    .join("");

  return createSvg(
    width,
    height,
    `
      ${grid}
      <polyline points="${spendPoints}" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
      <polyline points="${leadsPoints}" fill="none" stroke="#0f766e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
      ${markers}
      ${xLabels}
    `
  );
}

function renderBarChart(data, metric = "leads") {
  if (!data.length) return renderEmptyChart("Sin categorias disponibles.");

  const width = 640;
  const height = 320;
  const padding = { top: 14, right: 16, bottom: 24, left: 150 };
  const innerWidth = width - padding.left - padding.right;
  const innerHeight = height - padding.top - padding.bottom;
  const barGap = 16;
  const barHeight = (innerHeight - (data.length - 1) * barGap) / data.length;
  const maxValue = Math.max(...data.map((item) => item[metric]));

  const bars = data
    .map((item, index) => {
      const widthRatio = item[metric] / maxValue;
      const barWidth = innerWidth * widthRatio;
      const y = padding.top + index * (barHeight + barGap);
      const valueLabel =
        metric === "leads"
          ? formatInteger(item[metric])
          : metric === "amount"
          ? formatCompactCurrency(item[metric])
          : metric === "ctr"
          ? formatPercent(item[metric])
          : formatDecimal(item[metric]);

      return `
        <text x="${padding.left - 14}" y="${y + barHeight / 2 + 4}" text-anchor="end" class="chart-label">${item.category}</text>
        <rect x="${padding.left}" y="${y}" width="${barWidth}" height="${barHeight}" rx="10" fill="url(#barGradient)"></rect>
        <text x="${padding.left + barWidth + 12}" y="${y + barHeight / 2 + 4}" class="chart-value">${valueLabel}</text>
      `;
    })
    .join("");

  return createSvg(
    width,
    height,
    `
      <defs>
        <linearGradient id="barGradient" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#0f766e"></stop>
          <stop offset="100%" stop-color="#155eef"></stop>
        </linearGradient>
      </defs>
      ${bars}
    `
  );
}

function renderMultiLineChart(series, metric = "cpl") {
  if (!series.length) return renderEmptyChart("Sin historico disponible.");

  const width = 640;
  const height = 280;
  const padding = { top: 20, right: 20, bottom: 36, left: 36 };
  const innerWidth = width - padding.left - padding.right;
  const innerHeight = height - padding.top - padding.bottom;
  const palette = ["#155eef", "#0f766e", "#f59e0b", "#7c3aed", "#dc2626"];
  const points = series.flatMap((item) => item.values.map((entry) => entry[metric]));
  const maxValue = Math.max(...points);
  const minValue = Math.min(...points);
  const range = maxValue - minValue || 1;
  const stepX = innerWidth / Math.max(1, series[0].values.length - 1);

  const toX = (index) => padding.left + stepX * index;
  const toY = (value) =>
    padding.top + innerHeight - ((value - minValue) / range) * innerHeight;

  const grid = [0, 0.25, 0.5, 0.75, 1]
    .map((ratio) => {
      const y = padding.top + innerHeight * ratio;
      return `<line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" class="chart-grid"></line>`;
    })
    .join("");

  const xLabels = series[0].values
    .map(
      (item, index) =>
        `<text x="${toX(index)}" y="${height - 10}" text-anchor="middle" class="chart-label">${item.month}</text>`
    )
    .join("");

  const paths = series
    .map((item, index) => {
      const color = palette[index % palette.length];
      const line = item.values
        .map((entry, pointIndex) => `${toX(pointIndex)},${toY(entry[metric])}`)
        .join(" ");
      const markers = item.values
        .map(
          (entry, pointIndex) =>
            `<circle cx="${toX(pointIndex)}" cy="${toY(entry[metric])}" r="4" fill="${color}"></circle>`
        )
        .join("");
      return `
        <polyline points="${line}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
        ${markers}
      `;
    })
    .join("");

  return createSvg(width, height, `${grid}${paths}${xLabels}`);
}

function renderDonutChart(data) {
  return renderMetricDonutChart(data, {
    metric: "leads",
    centerLabel: "Leads",
    centerValueFormatter: formatInteger,
    valueFormatter: formatInteger,
    emptyMessage: "Sin mix de categorias.",
  });
}

function renderMetricDonutChart(
  data,
  {
    metric,
    centerLabel,
    centerValueFormatter = formatInteger,
    valueFormatter = formatInteger,
    emptyMessage = "Sin datos.",
    centerValue,
  }
) {
  if (!data.length) return renderEmptyChart(emptyMessage);

  const width = 260;
  const height = 260;
  const cx = 130;
  const cy = 130;
  const radius = 88;
  const stroke = 28;
  const total = data.reduce((acc, item) => acc + item[metric], 0);
  const colors = ["#155eef", "#0f766e", "#f59e0b", "#7c3aed", "#dc2626"];
  let cumulative = 0;

  const segments = data
    .map((item, index) => {
      const ratio = total ? item[metric] / total : 0;
      const dash = ratio * 2 * Math.PI * radius;
      const gap = 2 * Math.PI * radius - dash;
      const segment = `
        <circle
          cx="${cx}"
          cy="${cy}"
          r="${radius}"
          fill="none"
          stroke="${colors[index % colors.length]}"
          stroke-width="${stroke}"
          stroke-dasharray="${dash} ${gap}"
          stroke-dashoffset="${-cumulative}"
          transform="rotate(-90 ${cx} ${cy})"
          stroke-linecap="butt"
        ></circle>
      `;
      cumulative += dash;
      return segment;
    })
    .join("");

  return createSvg(
    width,
    height,
    `
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#e6ecf5" stroke-width="${stroke}"></circle>
      ${segments}
      <text x="${cx}" y="${cy - 6}" text-anchor="middle" class="donut-total">${centerValueFormatter(
        centerValue ?? total
      )}</text>
      <text x="${cx}" y="${cy + 18}" text-anchor="middle" class="donut-subtitle">${centerLabel}</text>
    `
  );
}

function formatMetricValue(metric, value) {
  if (metric === "leads") return formatInteger(value);
  if (metric === "amount") return formatCompactCurrency(value);
  if (metric === "cpl") return formatCurrency(value);
  if (metric === "ctr") return formatPercent(value);
  return formatDecimal(value);
}

function renderEmptyChart(message) {
  return `
    <div class="empty-state chart-empty">
      <div class="empty-state__icon">∅</div>
      <p>${message}</p>
    </div>
  `;
}

            )

              ${renderKpiCard("Inversion", formatCurrency(kpis.amount), getVariation(kpis.amount, previousKpis.amount), "Monto total invertido")}
              ${renderKpiCard("CPL promedio", formatCurrency(kpis.cpl), getVariation(kpis.cpl, previousKpis.cpl), "Costo por lead ponderado", true)}

function renderKpiCard(title, value, variation, caption, inverse = false) {
  const tone = getVariationTone(variation, inverse);
  return `
    <article class="panel kpi-card">
      <div class="kpi-card__top">
        <span class="kpi-card__label">${title}</span>
        <span class="variation variation--${tone}">${formatSignedPercent(variation)}</span>
      </div>
      <strong class="kpi-card__value">${value}</strong>
      <p class="kpi-card__caption">${caption}</p>
    </article>
  `;
}

function getTableRows(filteredRows) {
  return buildTableRows(filteredRows)
    .filter((row) => {
      const haystack = `${row.category} ${row.month}`.toLowerCase();
      return haystack.includes(state.search.toLowerCase());
    })
    .sort((a, b) => {
      if (a[state.sortBy] === b[state.sortBy]) return 0;
      const direction = state.sortDir === "desc" ? -1 : 1;
      return a[state.sortBy] > b[state.sortBy] ? direction : -direction;
    });
}

function renderDonutLegend(items, metric) {
  return items
    .map(
      (item, index) => `
        <div class="legend-row">
          <span class="legend-row__label">
            <i class="legend-dot legend-dot--idx-${index}"></i>${item.category}
          </span>
          <strong>${formatMetricValue(metric, item[metric])}</strong>
        </div>
      `
    )
    .join("");
}

function getAverage(items, metric) {
  if (!items.length) return 0;
  return items.reduce((acc, item) => acc + item[metric], 0) / items.length;
}

function bindEvents() {
  document.querySelector("#resetFiltersBtn")?.addEventListener("click", () => {
    state.filters = {
      startMonth: monthOrder[0],
      endMonth: monthOrder[monthOrder.length - 1],
      categories: [],
    };
    state.search = "";
    render();
  });

  document.querySelector("#startMonth")?.addEventListener("change", (event) => {
    const nextMonth = event.target.value;
    if (monthOrder.indexOf(nextMonth) > monthOrder.indexOf(state.filters.endMonth)) {
      state.filters.endMonth = nextMonth;
    }
    state.filters.startMonth = nextMonth;
    render();
  });

  document.querySelector("#endMonth")?.addEventListener("change", (event) => {
    const nextMonth = event.target.value;
    if (monthOrder.indexOf(nextMonth) < monthOrder.indexOf(state.filters.startMonth)) {
      state.filters.startMonth = nextMonth;
    }
    state.filters.endMonth = nextMonth;
    render();
  });

  document.querySelectorAll("[data-category]").forEach((button) => {
    button.addEventListener("click", () => {
      const category = button.dataset.category;
      const exists = state.filters.categories.includes(category);
      state.filters.categories = exists
        ? state.filters.categories.filter((item) => item !== category)
        : [...state.filters.categories, category];
      render();
    });
  });

  document.querySelector("#searchInput")?.addEventListener("input", (event) => {
    state.search = event.target.value;
    render();
  });

  document.querySelector("#sortBy")?.addEventListener("change", (event) => {
    state.sortBy = event.target.value;
    render();
  });

  document.querySelector("#sortDirBtn")?.addEventListener("click", () => {
    state.sortDir = state.sortDir === "desc" ? "asc" : "desc";
    render();
  });
}

function buildCplHistory(rows) {
  const categories = [...new Set(rows.map((row) => row.category))];
  return categories.map((category) => ({
    category,
    values: monthOrder
      .map((month) => rows.find((row) => row.category === category && row.month === month))
      .filter(Boolean)
      .map((row) => ({ month: row.month, cpl: row.cpl })),
  }));
}

render();
init();
